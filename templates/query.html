{% extends "base.html" %}
{% block title %}SQL Query{% endblock %}
{% block content %}
<h1>SQL Query</h1>

<div class="query-editor">
    <textarea id="sql-input" placeholder="SELECT * FROM leads LIMIT 20;">SELECT * FROM leads LIMIT 20;</textarea>
    <div class="query-actions">
        <button class="btn btn-primary" onclick="runQuery()">Run Query</button>
        <span class="query-status" id="query-status"></span>
    </div>
</div>

<p style="color: var(--text-muted); font-size: 0.82rem; margin-bottom: 14px;">
    Table: <strong>leads</strong> &mdash; Only SELECT queries allowed.
</p>

<div class="table-container" id="results-container" style="display:none;">
    <table id="results-table">
        <thead id="results-head"></thead>
        <tbody id="results-body"></tbody>
    </table>
</div>

<div class="query-editor" style="margin-top: 20px;">
    <h3 style="margin-bottom: 10px; font-size: 0.9rem; color: var(--text-muted);">Quick Queries</h3>
    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
        <button class="btn btn-sm btn-primary" onclick="setQuery('SELECT company_name, status, owner, layer, component, contact_name, email FROM leads ORDER BY company_name')">All Leads Overview</button>
        <button class="btn btn-sm btn-primary" onclick="setQuery('SELECT status, COUNT(*) as count FROM leads GROUP BY status ORDER BY count DESC')">Count by Status</button>
        <button class="btn btn-sm btn-primary" onclick="setQuery('SELECT layer, COUNT(*) as count FROM leads GROUP BY layer ORDER BY count DESC')">Count by Layer</button>
        <button class="btn btn-sm btn-primary" onclick="setQuery('SELECT owner, COUNT(*) as count FROM leads GROUP BY owner ORDER BY count DESC')">Count by Owner</button>
        <button class="btn btn-sm btn-primary" onclick="setQuery('SELECT company_name, contact_name, email, response_date, engaged_date FROM leads WHERE response_date != \"\" ORDER BY response_date DESC')">Responded Leads</button>
        <button class="btn btn-sm btn-primary" onclick="setQuery('SELECT company_name, contact_name, engaged_date FROM leads WHERE engaged_date != \"\" ORDER BY engaged_date DESC')">Engaged Leads</button>
        <button class="btn btn-sm btn-primary" onclick="setQuery('SELECT company_name, contact_name, touch_1_date, touch_1_channel, touch_2_date, touch_2_channel, touch_3_date, touch_3_channel FROM leads WHERE touch_1_date != \"\" ORDER BY touch_1_date DESC')">Outreach Timeline</button>
        <button class="btn btn-sm btn-primary" onclick="setQuery('SELECT state, COUNT(*) as count FROM leads WHERE state != \"\" GROUP BY state ORDER BY count DESC')">By State</button>
        <button class="btn btn-sm btn-primary" onclick="setQuery('SELECT company_name, contact_name, warm_intro FROM leads WHERE warm_intro != \"\" AND lower(warm_intro) != \"no\"')">Warm Intros</button>
        <button class="btn btn-sm btn-primary" onclick="setQuery('SELECT company_name, contact_name, dirty_grade FROM leads WHERE dirty_grade != \"\" ORDER BY dirty_grade')">By Dirty Grade</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function setQuery(sql) {
    document.getElementById('sql-input').value = sql;
    runQuery();
}

async function runQuery() {
    const sql = document.getElementById('sql-input').value.trim();
    const status = document.getElementById('query-status');
    const container = document.getElementById('results-container');

    if (!sql) return;
    status.textContent = 'Running...';
    status.style.color = 'var(--text-muted)';

    try {
        const res = await fetch('/query/run', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({sql})
        });
        const data = await res.json();

        if (data.error) {
            status.textContent = 'Error: ' + data.error;
            status.style.color = 'var(--danger)';
            container.style.display = 'none';
            return;
        }

        status.textContent = data.count + ' rows returned';
        status.style.color = 'var(--success)';

        const head = document.getElementById('results-head');
        const body = document.getElementById('results-body');
        head.innerHTML = '<tr>' + data.columns.map(c => '<th>' + c + '</th>').join('') + '</tr>';
        body.innerHTML = data.rows.map(r =>
            '<tr>' + data.columns.map(c => '<td>' + (r[c] !== null && r[c] !== '' ? r[c] : '-') + '</td>').join('') + '</tr>'
        ).join('');
        container.style.display = 'block';
    } catch (e) {
        status.textContent = 'Network error';
        status.style.color = 'var(--danger)';
    }
}
</script>
{% endblock %}
